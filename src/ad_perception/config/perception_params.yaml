perception_node:
  ros__parameters:
    # 센서 토픽명
    topics:
      camera: /sensor/camera/front
      lidar: /sensor/lidar
      gps: /sensor/gps
      imu: /sensor/imu

    # YOLO 객체 탐지 설정
    yolo:
      model_path: ""  # 빈 문자열이면 자동 탐색 (models/yolo11n.pt)
      confidence_threshold: 0.5

    # 시맨틱 세그멘테이션 설정
    segmentation:
      model_type: "enet"  # "enet" 또는 "bisenetv2"
      input_size: 512

    # 과수원 행 감지 설정
    crop_row:
      enabled: true
      orchard_type: "PEAR"
      process_every_n_frames: 3   # 15Hz 카메라에서 5Hz 처리
      no_detect_limit: 10         # 5Hz × 10회 = 2초 미감지 → 행 끝
