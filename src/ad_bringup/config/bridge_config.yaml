# =============================================================================
# ros_gz_bridge 토픽 매핑 설정
# Gazebo Harmonic ↔ ROS2 토픽 브릿지
# =============================================================================

# --- 제어 입력 (ROS2 → Gazebo) ---
# C61-fix: velocity_smoother 출력을 Gazebo로 직접 연결 (collision_monitor 우회)
# Gazebo TrackedVehicle plugin은 /cmd_vel 수신
- topic_name: /cmd_vel
  ros_type_name: geometry_msgs/msg/Twist
  gz_type_name: gz.msgs.Twist
  direction: ROS_TO_GZ

# --- 오도메트리 (Gazebo → ROS2) ---
- topic_name: /odom
  ros_type_name: nav_msgs/msg/Odometry
  gz_type_name: gz.msgs.Odometry
  direction: GZ_TO_ROS

# --- GPS 센서 (Gazebo → ROS2) ---
- topic_name: /sensor/gps
  ros_type_name: sensor_msgs/msg/NavSatFix
  gz_type_name: gz.msgs.NavSat
  direction: GZ_TO_ROS

# --- IMU 센서 (Gazebo → ROS2) ---
- topic_name: /sensor/imu
  ros_type_name: sensor_msgs/msg/Imu
  gz_type_name: gz.msgs.IMU
  direction: GZ_TO_ROS

# --- RGBD 카메라 3대 (Gazebo → ROS2) ---
# C64-2: rgbd_camera → RGB Image + PointCloud2 브릿지
# rgbd_camera 토픽 구조: {base}/image (RGB), {base}/depth_image, {base}/points

# 전면 카메라 RGB
- topic_name: /sensor/camera/front/image
  ros_type_name: sensor_msgs/msg/Image
  gz_type_name: gz.msgs.Image
  direction: GZ_TO_ROS

# 전면 카메라 PointCloud2 (Nav2 costmap 장애물 소스)
- topic_name: /sensor/camera/front/points
  ros_type_name: sensor_msgs/msg/PointCloud2
  gz_type_name: gz.msgs.PointCloudPacked
  direction: GZ_TO_ROS

# 좌전방 카메라 RGB
- topic_name: /sensor/camera/left/image
  ros_type_name: sensor_msgs/msg/Image
  gz_type_name: gz.msgs.Image
  direction: GZ_TO_ROS

# 좌전방 카메라 PointCloud2
- topic_name: /sensor/camera/left/points
  ros_type_name: sensor_msgs/msg/PointCloud2
  gz_type_name: gz.msgs.PointCloudPacked
  direction: GZ_TO_ROS

# 우전방 카메라 RGB
- topic_name: /sensor/camera/right/image
  ros_type_name: sensor_msgs/msg/Image
  gz_type_name: gz.msgs.Image
  direction: GZ_TO_ROS

# 우전방 카메라 PointCloud2
- topic_name: /sensor/camera/right/points
  ros_type_name: sensor_msgs/msg/PointCloud2
  gz_type_name: gz.msgs.PointCloudPacked
  direction: GZ_TO_ROS

# --- RGBD 카메라 CameraInfo 3대 (Gazebo → ROS2) ---
# Foxglove Image 패널에서 3D 마커를 카메라 이미지에 투영할 때 필요

# 전면 카메라 CameraInfo
- topic_name: /sensor/camera/front/camera_info
  ros_type_name: sensor_msgs/msg/CameraInfo
  gz_type_name: gz.msgs.CameraInfo
  direction: GZ_TO_ROS

# 좌전방 카메라 CameraInfo
- topic_name: /sensor/camera/left/camera_info
  ros_type_name: sensor_msgs/msg/CameraInfo
  gz_type_name: gz.msgs.CameraInfo
  direction: GZ_TO_ROS

# 우전방 카메라 CameraInfo
- topic_name: /sensor/camera/right/camera_info
  ros_type_name: sensor_msgs/msg/CameraInfo
  gz_type_name: gz.msgs.CameraInfo
  direction: GZ_TO_ROS

# --- 시뮬레이션 시계 (Gazebo → ROS2) ---
- topic_name: /clock
  ros_type_name: rosgraph_msgs/msg/Clock
  gz_type_name: gz.msgs.Clock
  direction: GZ_TO_ROS

# --- Joint States (Gazebo → ROS2) ---
- topic_name: /joint_states
  ros_type_name: sensor_msgs/msg/JointState
  gz_type_name: gz.msgs.Model
  direction: GZ_TO_ROS
