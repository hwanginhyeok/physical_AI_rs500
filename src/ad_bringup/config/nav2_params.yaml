# =============================================================================
# Nav2 파라미터 설정
# 궤도차량(differential drive) 자율주행을 위한 네비게이션 스택 구성
# SmacPlannerLattice + MPPI Controller 조합
# =============================================================================

# --- 공통 시뮬레이션 시간 설정 ---
amcl:
  ros__parameters:
    use_sim_time: true

# -----------------------------------------------------------------------------
# BT Navigator: 행동 트리 기반 내비게이션 실행기
# NavigateThroughPoses를 기본 행동 트리로 사용
# -----------------------------------------------------------------------------
bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odometry/local
    bt_loop_duration: 10                            # BT 루프 주기 (ms)
    default_server_timeout: 20                      # 서버 타임아웃 (ms)
    wait_for_service_timeout: 1000                  # 서비스 대기 타임아웃 (ms)
    action_server_result_timeout: 900.0             # 액션 결과 타임아웃 (초)
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
    # 기본 BT XML (Nav2 내장)
    # default_nav_to_pose_bt_xml: ""
    # default_nav_through_poses_bt_xml: ""
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_assisted_teleop_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_are_error_codes_active_condition_bt_node
      - nav2_would_a_controller_recovery_help_condition_bt_node
      - nav2_would_a_planner_recovery_help_condition_bt_node
      - nav2_would_a_smoother_recovery_help_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_truncate_path_local_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_path_expiring_timer_condition
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_goal_updated_controller_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_controller_cancel_bt_node
      - nav2_path_longer_on_approach_bt_node
      - nav2_wait_cancel_bt_node
      - nav2_spin_cancel_bt_node
      - nav2_back_up_cancel_bt_node
      - nav2_assisted_teleop_cancel_bt_node
      - nav2_drive_on_heading_cancel_bt_node
      - nav2_is_battery_charging_condition_bt_node

# -----------------------------------------------------------------------------
# Planner Server: 글로벌 경로 계획
# SmacPlannerLattice - 격자 기반 최적 경로 계획 (후진 허용)
# -----------------------------------------------------------------------------
planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 20.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner::SmacPlannerLattice"
      tolerance: 0.25                               # 목표 허용 오차 (m)
      allow_unknown: true                            # 미지 영역 통과 허용
      max_iterations: 1000000                        # 최대 탐색 반복 횟수
      max_on_approach_iterations: 1000               # 목표 접근 시 최대 반복
      max_planning_time: 5.0                         # 최대 계획 시간 (초)
      analytic_expansion_ratio: 3.5                  # 분석적 확장 비율
      analytic_expansion_max_length: 3.0             # 분석적 확장 최대 길이 (m)
      analytic_expansion_max_cost: 200.0             # 분석적 확장 최대 비용
      analytic_expansion_max_cost_override: false
      reverse_penalty: 2.0                           # 후진 페널티
      change_penalty: 0.05                           # 방향 전환 페널티
      non_straight_penalty: 1.05                     # 비직선 이동 페널티
      cost_penalty: 2.0                              # 비용 페널티
      rotation_penalty: 5.0                          # 회전 페널티
      retrospective_penalty: 0.015                   # 회고 페널티
      lattice_filepath: ""                           # 래티스 파일 경로 (빈 값이면 기본 사용)
      lookup_table_size: 20.0                        # 룩업 테이블 크기 (m)
      cache_obstacle_heuristic: false
      allow_reverse_expansion: true                  # 후진 확장 허용
      smooth_path: true                              # 경로 평활화
      smoother:
        max_iterations: 1000
        w_smooth: 0.3                                # 평활화 가중치
        w_data: 0.2                                  # 데이터 가중치
        tolerance: 1.0e-10
        do_refinement: true                          # 경로 정밀화

# -----------------------------------------------------------------------------
# Controller Server: 로컬 경로 추종 (MPPI Controller)
# Model Predictive Path Integral - 샘플링 기반 최적 제어
# -----------------------------------------------------------------------------
controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0                       # 제어 주파수 (Hz)
    min_x_velocity_threshold: 0.001                  # 최소 전진 속도 임계값 (m/s)
    min_y_velocity_threshold: 0.5                    # 최소 횡방향 속도 임계값 (m/s)
    min_theta_velocity_threshold: 0.001              # 최소 회전 속도 임계값 (rad/s)
    failure_tolerance: 0.3                           # 경로 이탈 허용 오차
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    # 진행 상태 확인기
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5                  # 최소 이동 반경 (m)
      movement_time_allowance: 10.0                  # 이동 허용 시간 (초)

    # 목표 도달 확인기
    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25                        # XY 목표 허용 오차 (m)
      yaw_goal_tolerance: 0.25                       # Yaw 목표 허용 오차 (rad)

    # MPPI 컨트롤러 설정
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 56                                 # 예측 시간 스텝 수
      model_dt: 0.05                                 # 모델 시간 간격 (초) → 예측 시간 = 56 * 0.05 = 2.8초
      batch_size: 1000                               # 샘플 경로 수
      iteration_count: 1                             # MPPI 반복 횟수
      temperature: 0.3                               # 온도 파라미터 (낮을수록 탐욕적)
      gamma: 0.015                                   # 감마 (제어 비용 가중치)
      motion_model: "DiffDrive"                      # 운동 모델: 차동 구동 (궤도차량 근사)
      visualize: true                                # 시각화 마커 발행
      regenerate_noises: true                        # 매 반복 노이즈 재생성
      TrajectoryVisualizer:
        trajectory_step: 5                           # 시각화 경로 스텝 간격
        time_step: 3                                 # 시각화 시간 스텝 간격
      AckermannConstraints:
        min_turning_r: 0.2                           # 최소 회전 반경 (m)
      constraint_penalty: 4.0                        # 제약 위반 페널티

      # 속도 제한
      vx_max: 3.0                                    # 최대 전진 속도 (m/s)
      vx_min: -1.5                                   # 최대 후진 속도 (m/s)
      vy_max: 0.0                                    # 횡방향 속도 없음 (differential)
      wz_max: 2.0                                    # 최대 회전 속도 (rad/s)

      # 비평가 함수(Critics) 설정
      critics:
        - "GoalCritic"
        - "GoalAngleCritic"
        - "ObstaclesCritic"
        - "PathFollowCritic"
        - "PathAngleCritic"
        - "PathAlignCritic"
        - "PreferForwardCritic"

      # 목표 도달 비평가: 목표 지점에 가까워지도록 유도
      GoalCritic:
        enabled: true
        cost_power: 1                                # 비용 지수
        cost_weight: 5.0                             # 비용 가중치
        threshold_to_consider: 1.4                   # 활성화 거리 임계값 (m)

      # 목표 각도 비평가: 목표 방향으로 정렬
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.5                   # 활성화 거리 임계값 (m)

      # 장애물 비평가: 장애물 회피
      ObstaclesCritic:
        enabled: true
        cost_power: 1
        repulsion_weight: 1.5                        # 반발력 가중치
        critical_weight: 20.0                        # 치명적 근접 가중치
        consider_footprint: true                     # 로봇 풋프린트 고려
        collision_cost: 10000.0                      # 충돌 비용
        collision_margin_distance: 0.1               # 충돌 여유 거리 (m)
        near_goal_distance: 0.5                      # 목표 근처 거리 (m)
        inflation_layer_name: "inflation_layer"

      # 경로 추종 비평가: 글로벌 경로를 따라가도록 유도
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 5                      # 가장 먼 지점으로부터의 오프셋
        threshold_to_consider: 1.4                   # 활성화 거리 임계값 (m)

      # 경로 각도 비평가: 경로 방향으로 정렬
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.5
        max_angle_to_furthest: 1.0                   # 최대 허용 각도차 (rad)

      # 경로 정렬 비평가: 경로와의 횡방향 정렬
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 14.0
        max_path_occupancy_ratio: 0.05               # 최대 경로 점유 비율
        trajectory_point_step: 4                     # 궤적 포인트 스텝
        threshold_to_consider: 0.5
        use_path_orientations: false

      # 전진 선호 비평가: 후진보다 전진을 선호
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 0.5

# -----------------------------------------------------------------------------
# Smoother Server: 경로 평활화
# -----------------------------------------------------------------------------
smoother_server:
  ros__parameters:
    use_sim_time: true
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

# -----------------------------------------------------------------------------
# Behavior Server: 복구 행동 (스핀, 후진 등)
# -----------------------------------------------------------------------------
behavior_server:
  ros__parameters:
    use_sim_time: true
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    assisted_teleop:
      plugin: "nav2_behaviors::AssistedTeleop"
    wait:
      plugin: "nav2_behaviors::Wait"

# -----------------------------------------------------------------------------
# Waypoint Follower: 웨이포인트 순차 추종
# -----------------------------------------------------------------------------
waypoint_follower:
  ros__parameters:
    use_sim_time: true
    loop_rate: 20                                    # 루프 주파수 (Hz)
    stop_on_failure: false                           # 실패 시 정지 여부
    action_server_result_timeout: 900.0
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200                   # 웨이포인트 도착 후 대기 (ms)

# -----------------------------------------------------------------------------
# Velocity Smoother: 속도 평활화
# -----------------------------------------------------------------------------
velocity_smoother:
  ros__parameters:
    use_sim_time: true
    smoothing_frequency: 20.0                        # 평활화 주파수 (Hz)
    scale_velocities: false
    feedback: "OPEN_LOOP"                            # 피드백 모드
    max_velocity: [3.0, 0.0, 2.0]                    # [vx, vy, wz] 최대 속도
    min_velocity: [-1.5, 0.0, -2.0]                  # [vx, vy, wz] 최소 속도
    max_accel: [2.5, 0.0, 3.2]                       # [ax, ay, az] 최대 가속도
    max_decel: [-2.5, 0.0, -3.2]                     # 최대 감속도
    odom_topic: /odometry/local
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]               # 데드밴드 속도

# -----------------------------------------------------------------------------
# Collision Monitor: 충돌 모니터
# -----------------------------------------------------------------------------
collision_monitor:
  ros__parameters:
    use_sim_time: true
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "cmd_vel"
    state_topic: "collision_monitor_state"
    transform_tolerance: 0.2
    source_timeout: 1.0
    base_shift_correction: true
    stop_pub_timeout: 2.0
    polygons: ["FootprintApproach"]
    FootprintApproach:
      type: "polygon"
      action_type: "approach"
      footprint_topic: "/local_costmap/published_footprint"
      time_before_collision: 1.2                     # 충돌 예상 시간 (초)
      simulation_time_step: 0.1
      min_points: 6
      visualize: true
      enabled: true
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "/sensor/lidar"
      enabled: true

# -----------------------------------------------------------------------------
# Map Server: 맵 제공 서버
# -----------------------------------------------------------------------------
map_server:
  ros__parameters:
    use_sim_time: true
    yaml_filename: ""                                # 맵 파일 경로 (launch에서 설정)
    topic_name: "map"
    frame_id: "map"

# Map Saver: 맵 저장 서버
map_saver:
  ros__parameters:
    use_sim_time: true
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true

# -----------------------------------------------------------------------------
# Global Costmap: 글로벌 비용 지도
# static_layer + obstacle_layer + inflation_layer
# resolution: 0.1m
# -----------------------------------------------------------------------------
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 1.0                          # 갱신 주파수 (Hz)
      publish_frequency: 1.0                         # 발행 주파수 (Hz)
      global_frame: map
      robot_base_frame: base_link
      robot_radius: 0.7                              # 로봇 반경 (m) - 궤도차량 근사
      resolution: 0.1                                # 해상도 (m/pixel)
      track_unknown_space: true                      # 미지 영역 추적
      rolling_window: false                          # 고정 맵 (rolling 아님)
      always_send_full_costmap: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      # 정적 레이어: 사전 구축된 맵 데이터
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
        enabled: true

      # 장애물 레이어: 실시간 센서 데이터 기반 장애물
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: lidar_scan
        lidar_scan:
          topic: /sensor/lidar
          max_obstacle_height: 2.0                   # 최대 장애물 높이 (m)
          min_obstacle_height: 0.1                    # 최소 장애물 높이 (m)
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 30.0                   # 레이트레이스 최대 범위 (m)
          raytrace_min_range: 0.0
          obstacle_max_range: 25.0                   # 장애물 감지 최대 범위 (m)
          obstacle_min_range: 0.0

      # 팽창 레이어: 장애물 주변 안전 여유 공간
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        inflation_radius: 1.5                        # 팽창 반경 (m)
        cost_scaling_factor: 3.0                     # 비용 감쇠 계수
        inflate_unknown: false
        inflate_around_unknown: true

# -----------------------------------------------------------------------------
# Local Costmap: 로컬 비용 지도
# obstacle_layer + voxel_layer + inflation_layer
# resolution: 0.05m, rolling window
# -----------------------------------------------------------------------------
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 5.0                          # 갱신 주파수 (Hz)
      publish_frequency: 2.0                         # 발행 주파수 (Hz)
      global_frame: odom
      robot_base_frame: base_link
      robot_radius: 0.7                              # 로봇 반경 (m) - 궤도차량 근사
      resolution: 0.05                               # 해상도 (m/pixel) - 정밀 장애물 회피용
      rolling_window: true                           # 롤링 윈도우 모드
      width: 6.0                                     # 윈도우 너비 (m)
      height: 6.0                                    # 윈도우 높이 (m)
      always_send_full_costmap: true
      plugins: ["obstacle_layer", "voxel_layer", "inflation_layer"]

      # 장애물 레이어: 2D 장애물 감지
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: lidar_scan
        lidar_scan:
          topic: /sensor/lidar
          max_obstacle_height: 2.0
          min_obstacle_height: 0.1
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 15.0                   # 로컬은 더 짧은 범위
          raytrace_min_range: 0.0
          obstacle_max_range: 10.0
          obstacle_min_range: 0.0

      # 복셀 레이어: 3D 장애물 감지 (포인트클라우드 사용 시)
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        publish_voxel_map: true
        origin_z: 0.0
        z_resolution: 0.05                           # Z축 해상도 (m)
        z_voxels: 16                                 # Z축 복셀 수
        max_obstacle_height: 2.0
        min_obstacle_height: 0.1
        mark_threshold: 0                            # 마킹 임계값
        observation_sources: lidar_scan
        lidar_scan:
          topic: /sensor/lidar
          max_obstacle_height: 2.0
          min_obstacle_height: 0.1
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 15.0
          raytrace_min_range: 0.0
          obstacle_max_range: 10.0
          obstacle_min_range: 0.0

      # 팽창 레이어: 로컬 장애물 팽창
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
