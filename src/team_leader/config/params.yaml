team_leader:
  ros__parameters:
    # 메인 루프 주기 (Hz)
    control_rate: 20.0

    # 주행 파라미터 (궤도차량 기준)
    max_speed: 3.0           # 최대 속도 (m/s) - 1톤 궤도차량
    safe_distance: 5.0       # 안전 거리 (m)

    # PID 제어 게인
    control:
      speed_kp: 1.0
      speed_ki: 0.01
      speed_kd: 0.1
      steer_kp: 1.5

    # 토픽명 (Gazebo 브릿지와 일치)
    topics:
      cmd_vel: /cmd_vel
      camera: /sensor/camera/front
      lidar: /sensor/lidar
      gps: /sensor/gps
      imu: /sensor/imu
