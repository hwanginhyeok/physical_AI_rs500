# =============================================================================
# LIO-SAM 파라미터 설정
# LiDAR-Inertial Odometry via Smoothing and Mapping
#
# RS500 궤도차량 자율주행 프로젝트용 설정
# - 인수 그래프(Factor Graph) 기반 LiDAR-IMU-GPS 동시 최적화
# - GPS 가용 시 GPS 팩터 활성, GPS 불가 시 LiDAR-IMU 단독 동작
#
# 참조: Shan et al., "LIO-SAM: Tightly-coupled Lidar Inertial Odometry
#       via Smoothing and Mapping," IROS 2020
# =============================================================================

lio_sam:
  ros__parameters:
    use_sim_time: true

    # =========================================================================
    # 토픽 설정
    # =========================================================================
    # 입력 센서 토픽 (시뮬레이션 환경 기준)
    pointCloudTopic: "/sensor/lidar"          # LiDAR 포인트클라우드 토픽
    imuTopic: "/sensor/imu"                   # IMU 토픽 (sensor_msgs/Imu)
    odomTopic: "/odom"                        # 휠 오도메트리 (사전 적분 보조)
    gpsTopic: "/sensor/gps"                   # GPS NavSatFix 토픽

    # 출력 토픽
    # LIO-SAM 오도메트리 출력 -> LocalizationManager가 구독
    # /odometry/slam (Odometry)
    # /lio_sam/mapping/cloud_registered (PointCloud2)

    # =========================================================================
    # 프레임 설정
    # =========================================================================
    lidarFrame: "base_link"                   # LiDAR 프레임 (TF)
    baselinkFrame: "base_link"                # 로봇 기본 프레임
    odometryFrame: "odom"                     # 오도메트리 프레임
    mapFrame: "map"                           # 맵 프레임

    # =========================================================================
    # GPS 설정
    # =========================================================================
    useGpsElevation: false                    # GPS 고도 사용 여부 (2D에서는 false)
    gpsCovThreshold: 2.0                      # GPS 공분산 임계값 (m)
                                              # 이 값 이하일 때만 GPS 팩터 추가
    poseCovThreshold: 25.0                    # 포즈 공분산 임계값
                                              # 포즈 불확실성이 이 값을 초과하면
                                              # GPS 팩터를 더 적극적으로 사용

    # GPS 팩터 가중치 설정
    # LocalizationManager가 GPS 가용성에 따라 동적 조정
    gpsFactorWeight: 1.0                      # GPS 팩터 기본 가중치 (0.0~1.0)
                                              # GPS_EKF 모드: 1.0
                                              # SLAM_ONLY 모드: 0.0
                                              # HYBRID 모드: 0.1~1.0 점진적
    useGpsFactor: true                        # GPS 팩터 사용 여부 (true/false)
                                              # SLAM_ONLY 모드 시 false로 전환

    # =========================================================================
    # IMU 설정
    # =========================================================================
    # IMU 파라미터 (RS500 시뮬레이션 기준)
    imuAccNoise: 3.9939570888238808e-03       # 가속도계 노이즈 밀도
    imuGyrNoise: 1.5636343949698187e-03       # 자이로스코프 노이즈 밀도
    imuAccBiasN: 6.4356659353532566e-05       # 가속도계 바이어스 랜덤워크
    imuGyrBiasN: 3.5640318696367613e-05       # 자이로스코프 바이어스 랜덤워크
    imuGravity: 9.80511                       # 중력 가속도 (m/s^2)
    imuRPYWeight: 0.01                        # IMU roll/pitch 가중치
                                              # 궤도차량은 평지 주행이 주이므로 낮게 설정

    # IMU 축 설정 (ROS REP-105 기준)
    # LiDAR와 IMU가 동일 프레임이면 단위 행렬
    # RS500의 IMU는 base_link 프레임에 정렬된 것으로 가정
    # 9축 IMU 필수 (가속도 + 자이로 + 자기장)

    # =========================================================================
    # 외부 파라미터 (Extrinsics)
    # =========================================================================
    # LiDAR -> IMU 변환 행렬 (4x4 동차 변환)
    # RS500 시뮬레이션에서 LiDAR와 IMU가 base_link에 co-located 가정
    extrinsicTrans: [0.0, 0.0, 0.0]          # 이동 [x, y, z] (m)
    extrinsicRot: [1.0, 0.0, 0.0,            # 회전 행렬 (row-major 3x3)
                   0.0, 1.0, 0.0,            # LiDAR 좌표계 = IMU 좌표계
                   0.0, 0.0, 1.0]            # (동일 프레임 장착)

    # =========================================================================
    # LiDAR 센서 설정
    # =========================================================================
    sensor: velodyne                          # LiDAR 유형: velodyne / ouster / livox
    N_SCAN: 16                                # LiDAR 스캔 라인 수 (VLP-16 기준)
    Horizon_SCAN: 1800                        # 수평 해상도 (포인트/스캔)
    downsampleRate: 1                         # 다운샘플 비율 (1 = 다운샘플 없음)
    lidarMinRange: 0.3                        # 최소 유효 거리 (m)
    lidarMaxRange: 80.0                       # 최대 유효 거리 (m)

    # =========================================================================
    # 특징점 추출 파라미터
    # =========================================================================
    edgeThreshold: 1.0                        # 엣지 특징점 곡률 임계값
    surfThreshold: 0.1                        # 서피스 특징점 곡률 임계값
    edgeFeatureMinValidNum: 10                # 엣지 특징점 최소 유효 수
    surfFeatureMinValidNum: 100               # 서피스 특징점 최소 유효 수

    # =========================================================================
    # 복셀 필터 크기 (다운샘플링)
    # =========================================================================
    # 맵핑 시 포인트 클라우드 다운샘플링 크기 (m)
    mappingCornerLeafSize: 0.2                # 엣지 특징점 복셀 크기
    mappingSurfLeafSize: 0.4                  # 서피스 특징점 복셀 크기

    # 스캔 매칭 시 다운샘플링
    odometrySurfLeafSize: 0.4                 # 오도메트리 서피스 복셀 크기

    # =========================================================================
    # 서라운드 맵 설정
    # =========================================================================
    surroundingkeyframeAddingDistThreshold: 1.0   # 키프레임 추가 거리 임계값 (m)
    surroundingkeyframeAddingAngleThreshold: 0.2  # 키프레임 추가 각도 임계값 (rad)
    surroundingKeyframeDensity: 2.0               # 서라운드 맵 키프레임 밀도 (m)
    surroundingKeyframeSearchRadius: 50.0         # 서라운드 맵 탐색 반경 (m)

    # =========================================================================
    # 루프 클로저 설정
    # =========================================================================
    loopClosureEnableFlag: true               # 루프 클로저 활성화 여부
    loopClosureFrequency: 1.0                 # 루프 클로저 탐색 주파수 (Hz)
    surroundingKeyframeSize: 50               # 루프 탐색 시 주변 키프레임 수
    historyKeyframeSearchRadius: 15.0         # 히스토리 키프레임 탐색 반경 (m)
    historyKeyframeSearchTimeDiff: 30.0       # 시간 차이 임계값 (초)
    historyKeyframeSearchNum: 25              # 히스토리 키프레임 탐색 수
    historyKeyframeFitnessScore: 0.3          # ICP 매칭 점수 임계값
                                              # (낮을수록 엄격)

    # =========================================================================
    # 맵 저장/로드 설정
    # =========================================================================
    savePCD: false                            # PCD 파일 저장 여부
    savePCDDirectory: "/tmp/lio_sam_maps/"    # PCD 저장 경로

    # =========================================================================
    # 성능 튜닝 파라미터
    # =========================================================================
    # 인수 그래프 최적화 설정 (GTSAM)
    numberOfCores: 4                          # 병렬 처리 코어 수
    mappingProcessInterval: 0.15              # 맵핑 처리 간격 (초)
                                              # 0.15초 = ~6.7Hz (CPU 부하 고려)

    # z축 제약 (2D 주행 시 z 드리프트 방지)
    z_tollerance: 1000.0                      # z축 허용 범위 (m)
                                              # 큰 값 = 제약 없음 (3D 맵핑)
    rotation_tollerance: 1000.0               # 회전 허용 범위 (rad)
                                              # 큰 값 = 제약 없음

    # =========================================================================
    # RS500 궤도차량 특화 설정
    # =========================================================================
    # 궤도차량은 skid-steer 특성상 급격한 회전 시 포인트 클라우드 왜곡이
    # 발생할 수 있다. 아래 파라미터로 보상:
    #
    # IMU 사전적분(preintegration) 시 높은 angular velocity를 허용하여
    # 제자리 회전(spin turn) 시에도 안정적인 오도메트리를 유지한다.
    #
    # 또한 농경지 환경은 평탄한 지형이 많아 서피스 특징점 추출에 유리하지만,
    # 반복적인 패턴(고랑)으로 인해 루프 클로저 오탐이 발생할 수 있으므로
    # historyKeyframeFitnessScore를 보수적으로 설정한다.
