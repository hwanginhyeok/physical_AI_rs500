# ros_gz_bridge 토픽 매핑 설정
# 방향: [ros_type_name, gz_type_name, direction]
# direction: BIDIRECTIONAL / ROS_TO_GZ / GZ_TO_ROS

# ==================== 시스템 토픽 ====================

# 시뮬레이션 시간 동기화 (Nav2, robot_localization 필수)
- ros_topic_name: /clock
  ros_type_name: rosgraph_msgs/msg/Clock
  gz_type_name: gz.msgs.Clock
  direction: GZ_TO_ROS
  gz_topic_name: /clock

# ==================== 명령 토픽 ====================

- ros_topic_name: /cmd_vel
  ros_type_name: geometry_msgs/msg/Twist
  gz_type_name: gz.msgs.Twist
  direction: ROS_TO_GZ
  gz_topic_name: /model/tracked_vehicle/cmd_vel

# ==================== 센서 토픽 ====================

# GPS (NavSat)
- ros_topic_name: /sensor/gps
  ros_type_name: sensor_msgs/msg/NavSatFix
  gz_type_name: gz.msgs.NavSat
  direction: GZ_TO_ROS
  gz_topic_name: /world/agricultural_field/model/tracked_vehicle/link/chassis/sensor/gps_sensor/navsat

# IMU
- ros_topic_name: /sensor/imu
  ros_type_name: sensor_msgs/msg/Imu
  gz_type_name: gz.msgs.IMU
  direction: GZ_TO_ROS
  gz_topic_name: /world/agricultural_field/model/tracked_vehicle/link/chassis/sensor/imu_sensor/imu

# 전방 카메라 (이미지)
- ros_topic_name: /sensor/camera/front
  ros_type_name: sensor_msgs/msg/Image
  gz_type_name: gz.msgs.Image
  direction: GZ_TO_ROS
  gz_topic_name: /world/agricultural_field/model/tracked_vehicle/link/chassis/sensor/front_camera/image

# 전방 카메라 (캘리브레이션 정보)
- ros_topic_name: /sensor/camera/front/camera_info
  ros_type_name: sensor_msgs/msg/CameraInfo
  gz_type_name: gz.msgs.CameraInfo
  direction: GZ_TO_ROS
  gz_topic_name: /world/agricultural_field/model/tracked_vehicle/link/chassis/sensor/front_camera/camera_info

# LiDAR (3D PointCloud2 — 선행연구: LaserScan에서 변경)
- ros_topic_name: /sensor/lidar/points
  ros_type_name: sensor_msgs/msg/PointCloud2
  gz_type_name: gz.msgs.PointCloudPacked
  direction: GZ_TO_ROS
  gz_topic_name: /world/agricultural_field/model/tracked_vehicle/link/chassis/sensor/lidar_sensor/scan/points

# LiDAR (2D LaserScan — 하위 호환성 유지)
- ros_topic_name: /sensor/lidar
  ros_type_name: sensor_msgs/msg/LaserScan
  gz_type_name: gz.msgs.LaserScan
  direction: GZ_TO_ROS
  gz_topic_name: /world/agricultural_field/model/tracked_vehicle/link/chassis/sensor/lidar_sensor/scan

# ==================== 오도메트리 ====================

- ros_topic_name: /odom
  ros_type_name: nav_msgs/msg/Odometry
  gz_type_name: gz.msgs.Odometry
  direction: GZ_TO_ROS
  gz_topic_name: /model/tracked_vehicle/odometry

# TF (좌표 변환 — Nav2 필수)
- ros_topic_name: /tf
  ros_type_name: tf2_msgs/msg/TFMessage
  gz_type_name: gz.msgs.Pose_V
  direction: GZ_TO_ROS
  gz_topic_name: /model/tracked_vehicle/pose
